name: Python Network Test CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install iperf3
        run: |
          sudo apt-get update
          sudo apt-get install -y iperf3

      - name: Start iperf3 Server
        run: |
          iperf3 -s &
          sleep 2

      - name: Start Mock DUT Server
        run: |
          python mock_dut_server.py &
          sleep 2

      - name: Run Tests
        run: |
          pytest tests -v
